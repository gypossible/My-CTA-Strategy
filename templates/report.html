<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNQuant 商品期货量化回测评估引擎 V4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif; }
        
        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-4xl font-bold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">CNQuant 商品期货极值回测引擎</h1>
        <p class="text-slate-400 mb-8">深度量化评测体系 V4.0：基于多元品种的十大核心指标剖析</p>
        
        <div class="mb-6 border-b border-slate-700 pb-3 flex flex-col md:flex-row md:items-center space-y-4 md:space-y-0">
            <div class="flex items-center">
                <label for="strategy-select" class="mr-4 text-emerald-400 font-semibold whitespace-nowrap">选择评测组合:</label>
                <select id="strategy-select" onchange="switchTab(this.value)" class="bg-slate-800 text-white border border-slate-600 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 shadow-lg cursor-pointer font-medium hover:bg-slate-700 transition-colors w-full md:w-auto">
                    <!-- Select options JS logic -->
                </select>
            </div>
        </div>

        <!-- Strategy & Asset Description Box -->
        <div id="strategy-description" class="p-5 bg-slate-800/60 border-l-4 border-blue-500 rounded-r-xl shadow-inner text-slate-300 text-sm mb-6 leading-relaxed tracking-wide transition-opacity duration-300">
            <!-- Dynamic descriptive text -->
        </div>

        <div id="metrics-container" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 mb-8">
            <!-- Metrics cards will be injected here -->
        </div>

        <div class="bg-slate-800 rounded-xl p-6 shadow-xl border border-slate-700 relative">
            <h2 class="text-xl font-semibold mb-4 text-emerald-400" id="chart-title">净值与绝对回撤曲线</h2>
            <div id="main-chart" class="w-full h-[550px]"></div>
        </div>
    </div>

    <script>
        const chartData = {{ chart_data | safe }};
        const keys = Object.keys(chartData.strategies);
        
        let currentStrategy = keys[0];
        let echartInstance = echarts.init(document.getElementById('main-chart'), 'dark');
        
        function renderTabs() {
            const selectEl = document.getElementById('strategy-select');
            selectEl.innerHTML = keys.map(k => `
                <option value="${k}" ${k === currentStrategy ? 'selected' : ''}>
                    ${k}
                </option>
            `).join('');
        }
        
        function renderMetrics(metrics) {
            const container = document.getElementById('metrics-container');
            container.innerHTML = Object.entries(metrics).map(([k, v]) => {
                let colorClass = 'text-white';
                if (typeof v === 'string' && v.includes('-') && !k.includes('日期') && !k.includes('深谷日') && !k.includes('顶峰日')) {
                    colorClass = 'text-red-400';
                } else if (k.includes('收益') && typeof v === 'string' && !v.includes('-') && v !== '0.00%') {
                    colorClass = 'text-emerald-400';
                } else if (k.includes('盈亏比') && parseFloat(v) > 1.0) {
                    colorClass = 'text-emerald-400';
                }
                
                return `
                <div class="bg-slate-800/50 p-4 rounded-lg border border-slate-700 hover:bg-slate-800 transition-colors">
                    <p class="text-slate-400 text-xs mb-1">${k}</p>
                    <p class="text-lg font-bold truncate ${colorClass}">${v}</p>
                </div>
                `;
            }).join('');
        }
        
        function renderChart() {
            const data = chartData.strategies[currentStrategy];
            const dates = chartData.dates;
            
            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross' }
                },
                legend: {
                    data: ['策略资金净值', '单一合约死扛基准(1手)', '最大历史回撤区域'],
                    textStyle: { color: '#cbd5e1' },
                    bottom: 0
                },
                grid: { left: '4%', right: '4%', bottom: '10%', top: '5%', containLabel: true },
                dataZoom: [{ type: 'inside' }, { type: 'slider', textStyle: { color: '#cbd5e1' }, bottom: 30 }],
                xAxis: {
                    type: 'category',
                    data: dates,
                    axisLine: { lineStyle: { color: '#475569' } },
                    axisLabel: { color: '#94a3b8' }
                },
                yAxis: [
                    {
                        type: 'value',
                        name: '账户总权益 (¥)',
                        splitLine: { lineStyle: { color: '#1e293b' } },
                        axisLabel: { color: '#94a3b8' },
                        scale: true
                    },
                    {
                        type: 'value',
                        name: '资金回撤 (%)',
                        position: 'right',
                        splitLine: { show: false },
                        axisLabel: { color: '#ef4444' },
                        max: 0
                    }
                ],
                series: [
                    {
                        name: '策略资金净值',
                        type: 'line',
                        data: data.equity,
                        itemStyle: { color: '#34d399' },
                        lineStyle: { width: 2 },
                        showSymbol: false
                    },
                    {
                        name: '单一合约死扛基准(1手)',
                        type: 'line',
                        data: data.market,
                        itemStyle: { color: '#64748b' },
                        lineStyle: { width: 1.5, type: 'dashed' },
                        showSymbol: false
                    },
                    {
                        name: '最大历史回撤区域',
                        type: 'line',
                        yAxisIndex: 1,
                        data: data.drawdown,
                        itemStyle: { color: '#ef4444' },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(239, 68, 68, 0.05)' },
                                { offset: 1, color: 'rgba(239, 68, 68, 0.4)' }
                            ])
                        },
                        showSymbol: false,
                        lineStyle: { width: 1 }
                    }
                ]
            };
            
            echartInstance.setOption(option);
            document.getElementById('chart-title').innerText = currentStrategy + " · 净值与风控深度剖面";
        }
        
        const stratDescriptions = {
            "趋势跟随": "【趋势跟随 (Dual Moving Average)】：双均线交叉趋势追踪模型。当短期均线（10日）向上突破长期均线（30日）时入场做多；当下穿时平多做空。该策略在清晰的单边牛熊市中表现极其优异，是截断亏损让利润狂奔的典型代表，但在横盘震荡期极易遭受双面止损（俗称“左右打脸”）。",
            "震荡反转": "【震荡反转 (Mean Reversion)】：RSI与动态布林带结合的均值回归模型。当RSI深陷超卖区（<30）且价格跌破布林带下轨时，认为下跌动能衰竭，在此抄底做多；反之超买突破上轨时摸顶做空。此系统专为宽幅震荡（箱体）行情设计，在单边暴涨暴跌中存在逆势扛单的较高回撤风险。",
            "海龟交易法则": "【海龟交易法则 (Turtle System 一)】：华尔街最负盛名的CTA传世经典。20日价格高点绝对突破入场做多，10日低点跌破则无条件斩仓止损/止盈出局。由于彻底剥离了人的主观预测预判，系统自带严苛的断臂求生风控，能在几年一遇的超级大宗周期里获取不对称的暴利。"
        };

        const assetDescriptions = {
            "RB0": "【工业品-螺纹钢(RB0)】：中国基建宏观经济的绝对晴雨表，也是国内商品市场流动性最好、连续性最强的纯正工业品之王。合约乘数 10 倍杠杆。",
            "I0": "【黑色系-铁矿石(I0)】：黑色产业链的高波动猛兽。严重受海外矿山联合定价与国内钢厂宏观需求双重影响，极易受政策催化走出波澜壮阔的单边行情。合约乘数 100 倍巨大杠杆。",
            "CU0": "【有色金属-沪铜(CU0)】：拥有“铜博士”之冠的有色金属龙头。与全球地缘宏观经济和美元指数深度挂钩，定价锚定伦敦铜（LME）。其长期趋势极其流畅深远。合约乘数 5 倍杠杆。",
            "TA0": "【化工品-PTA(TA0)】：深度依附于国际原油价格的化工系主力大单品。波动具有极为强烈的库存周期性与输入性通胀特征。合约乘数 5 倍杠杆。",
            "FG0": "【建材-玻璃(FG0)】：深度捆绑我国房地产竣工周期的后端建材品种，走势经常“妖气十足”，时常受现货厂库现结压板影响产生反逻辑急涨急跌行情。合约乘数 20 倍杠杆。",
            "M0": "【农产品-豆粕(M0)】：国内农业品量化标杆。定价受北美及南美大豆种植区极端气候（拉尼娜/厄尔尼诺）及主产国进出口政策影响极大，具备明显的时令季节性炒作规律。合约乘数 10 倍杠杆。",
            "SR0": "【软商品-白糖(SR0)】：人送外号“软妖糖”。因其主产区（巴西、印度及我国广西）的天气不可测特性及替代营养品等众多因素交织，常现3-5年的跨度长牛熊切变，是考验长线趋势策略耐心的绝佳试金石。合约乘数 10 倍杠杆。",
            "MA0": "【化工品-甲醇(MA0)】：煤化工产业链的中枢核心。与动力煤强正相关，资金博弈异常激烈，属于典型的高弹性高持仓化工明星。合约乘数 10 倍杠杆。",
            "RM0": "【农产品-菜粕(RM0)】：与豆粕高度伴生的饲料原料。常因加拿大菜籽进口政策与国内水产养殖周期的错配，爆发出短期极强的逆势行情。合约乘数 10 倍杠杆。",
            "AL0": "【有色金属-沪铝(AL0)】：在宏观基本面外受极强的“产能天花板”及“能源成本”约束，有色里的防守反击王者。合约乘数 5 倍杠杆。",
            "JM0": "【黑色系-焦煤(JM0)】：被称为冶金之“原粮”。供给端高度受制于澳煤蒙煤进口管控及国内安监环保检查，经常在供给端故事推波助澜下产生超级单边市。合约乘数 60 倍杠杆。",
            "C0": "【农产品-玉米(C0)】：关系国家粮食安全的基石品种。波动受美农报告与国储收托市政策牢牢定海，是一个极少发生极端暴走但极其考究微观基本面的品种。合约乘数 10 倍杠杆。",
            "SA0": "【化工品-纯碱(SA0)】：与玻璃深度绑定，被称为“玻璃之母”。因为产能供给的阶段性极度短缺及过剩周期，它时常爆发出极其癫狂的走势，被广大散户戏称为“妖碱”。合约乘数 20 倍杠杆。",
            "HC0": "【黑色系-热卷(HC0)】：与螺纹钢属于钢铁产业链的双胞胎，但更多体现在制造业、汽车等板材需求端。行情常常与螺纹钢比翼双飞，也会受特定制造业影响分化。合约乘数 10 倍杠杆。",
            "Y0": "【油脂类-豆油(Y0)】：同属大豆产业链的三大巨头之一（大豆、豆粕、豆油）。属于极佳的通胀对冲与餐饮消费防守型资产。合约乘数 10 倍杠杆。",
            "P0": "【油脂类-棕榈油(P0)】：全球油脂标杆。走势极大程度受到马来西亚及印尼主产区天气、生柴政策及出口税率的支配，妖星属性在油脂圈首屈一指。合约乘数 10 倍杠杆。",
            "V0": "【化工品-PVC(V0)】：氯碱化工产业链和地产基建后置周期的交叉点品种，供给端非常稳定，需求端博弈极其深远。合约乘数 5 倍杠杆。",
            "PP0": "【化工品-PP(PP0)】：聚丙烯，原油与煤炭皆可造的重化工原料，与塑料(L)相关性极强。不仅具备宏观化工大周期属性，还有包装耗材的时令特性。合约乘数 5 倍杠杆。",
            "AU0": "【贵金属-沪金(AU0)】：避险与抗通胀资产之王。受美联储利率、地缘政治与国际大放水周期严密锁定，一向以趋势最稳健、最少被假穿著称。合约乘数 1000 克超级杠杆！",
            "AG0": "【贵金属-沪银(AG0)】：不仅具备贵金属的避险属性，同时也承担了大量光伏、新能源等核心导电材料的白银板块属性，波段极其狂暴犀利！合约乘数高达 15 千克。"
        };

        function updateDescription(stratName) {
            let descBox = document.getElementById('strategy-description');
            
            let stratKey = "趋势跟随";
            if (stratName.includes("海龟")) stratKey = "海龟交易法则";
            else if (stratName.includes("震荡")) stratKey = "震荡反转";

            let assetKey = "未知品种";
            for (let code in assetDescriptions) {
                if (stratName.includes(`(${code})`)) {
                    assetKey = code;
                    break;
                }
            }

            const assetInfo = assetDescriptions[assetKey] || "【未知资产】抱歉，暂无该品种合约解读。";
            const stratInfo = stratDescriptions[stratKey] || "【未知策略】抱歉，暂无该量化策略的详情说明。";

            descBox.innerHTML = `
                <div class="mb-2"><span class="text-blue-400 font-bold tracking-wider mr-2">标的剖析 ➤</span> <span class="text-slate-200">${assetInfo}</span></div>
                <div><span class="text-emerald-400 font-bold tracking-wider mr-2">策略图鉴 ➤</span> <span class="text-slate-200">${stratInfo}</span></div>
            `;
        }

        window.switchTab = function(strat) {
            currentStrategy = strat;
            renderTabs();
            renderMetrics(chartData.strategies[strat].metrics);
            updateDescription(strat);
            renderChart();
        }
        
        window.addEventListener('resize', () => echartInstance.resize());
        
        switchTab(keys[0]);
    </script>
</body>
</html>
